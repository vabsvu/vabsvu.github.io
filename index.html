<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vabs.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&display=swap"
      rel="stylesheet"
    />

    <title>VABS - Vanderbilt Association of Bengali Students</title>

    <style>
      :root {
        color-scheme: dark;
      }
      html {
        background-color: #761f0a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(to bottom right, #992b0d, #761f0a, #4d1405);
        background-attachment: fixed;
        color: #eae0d5;
      }
      #vabs-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
      }
      #vabs-boot .vabs-boot-ring {
        width: 56px;
        height: 56px;
        border-radius: 9999px;
        border: 2px solid #bf9b30;
        animation: vabs-boot-pulse 1.8s ease-in-out infinite;
      }
      #vabs-boot .vabs-boot-word {
        font-family: "Quattrocento", Georgia, serif;
        font-size: 0.95rem;
        letter-spacing: 0.4em;
        text-indent: 0.4em;
        color: #bf9b30;
        animation: vabs-boot-pulse 1.8s ease-in-out infinite;
        animation-delay: 0.2s;
      }
      @keyframes vabs-boot-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #vabs-boot .vabs-boot-ring,
        #vabs-boot .vabs-boot-word {
          animation: none;
          opacity: 1;
        }
      }
      .vabs-noscript {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2rem;
        text-align: center;
        background: linear-gradient(to bottom right, #992b0d, #761f0a, #4d1405);
        font-family: "Quattrocento", Georgia, serif;
      }
      .vabs-noscript h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0.3em;
        text-indent: 0.3em;
        color: #bf9b30;
      }
      .vabs-noscript p {
        margin: 0;
        max-width: 28rem;
        color: #eae0d5;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="vabs-boot" aria-hidden="true">
        <div class="vabs-boot-ring"></div>
        <div class="vabs-boot-word">VABS</div>
      </div>
    </div>
    <noscript>
      <div class="vabs-noscript">
        <h1>VABS</h1>
        <p>
          Vanderbilt Association of Bengali Students. This site needs
          JavaScript to run &mdash; please enable it in your browser, then
          reload the page.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Boot watchdog: a classic (non-module) script runs even when the
         module graph fails to fetch. If React hasn't replaced the splash
         after 12s, swap it for an on-palette reload prompt. A slow-but-
         successful load self-heals: createRoot's first render replaces
         this fallback. -->
    <script>
      setTimeout(function () {
        var boot = document.getElementById("vabs-boot");
        if (!boot) return; /* React mounted; splash already replaced */
        boot.removeAttribute("aria-hidden");
        boot.setAttribute("role", "alert");
        boot.innerHTML =
          '<div class="vabs-boot-word" style="animation:none;opacity:1">VABS</div>' +
          "<p style=\"margin:0;max-width:24rem;text-align:center;color:#eae0d5;font-family:'Quattrocento',Georgia,serif;line-height:1.6\">Something went wrong while loading the site.</p>" +
          "<button onclick=\"location.reload()\" style=\"cursor:pointer;background:transparent;border:1px solid #bf9b30;border-radius:9999px;padding:0.5rem 1.5rem;color:#bf9b30;font-family:'Quattrocento',Georgia,serif;letter-spacing:0.2em;font-size:0.9rem\">Tap to reload</button>";
      }, 12000);
    </script>
  </body>
</html>
